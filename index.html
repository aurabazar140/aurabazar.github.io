<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraBazar - Premium Shop</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header style="background: black; color: gold; text-align: center; padding: 20px;">
        <h1>AuraBazar</h1>
        <p>সেরা মানের ফুটবল জার্সি এবং গ্যাজেট</p>
    </header>

    <div style="text-align: center; padding: 20px;">
        <input type="text" id="myInput" onkeyup="searchFunction()" placeholder="জার্সি বা গ্যাজেট খুঁজুন..." 
        style="width: 80%; max-width: 400px; padding: 12px; border-radius: 25px; border: 1px solid #ddd;">
    </div>

    <div id="product-list">
        <div class="product-container" style="text-align: center; padding: 20px; border: 1px solid #eee; margin: 10px; border-radius: 10px;">
            <img src="neymar.jpg.jpeg" alt="Neymar Jersey" style="width: 100%; max-width: 300px; border-radius: 10px;">
            <h2 class="product-name">Neymar Jr. Brazil Jersey</h2>
            <p>Price: 1200 BDT</p>
            <button onclick="openForm('Neymar Jr. Brazil Jersey')" style="background: #25D366; color: white; padding: 12px 25px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">Shop Now</button>
        </div>
    </div>

    <div id="orderModal" style="display:none; position:fixed; z-index:100; left:0; top:0; width:100%; height:100%; background-color:rgba(0,0,0,0.8); overflow-y: auto;">
      <div style="background-color:white; margin:10% auto; padding:25px; width:85%; max-width:400px; border-radius:15px;">
        <span onclick="closeForm()" style="float:right; cursor:pointer; font-size:28px;">&times;</span>
        <h2 style="text-align: center;">অর্ডার ফর্ম</h2>
        <p id="displayPName" style="text-align:center; font-weight:bold; color:#007bff;"></p>
        <form id="checkoutForm">
          <input type="text" id="custName" placeholder="আপনার নাম" required style="width:100%; padding:10px; margin:10px 0; border:1px solid #ccc; border-radius:5px;">
          <input type="tel" id="custPhone" placeholder="মোবাইল নম্বর" required style="width:100%; padding:10px; margin:10px 0; border:1px solid #ccc; border-radius:5px;">
          <textarea id="custAddress" placeholder="পুরো ঠিকানা (Delivery Address)" required style="width:100%; height:80px; padding:10px; margin:10px 0; border:1px solid #ccc; border-radius:5px;"></textarea>
          <button type="button" onclick="sendToWhatsApp()" style="background:#25D366; color:white; padding:15px; border:none; border-radius:5px; width:100%; font-weight:bold;">অর্ডার কনফার্ম করুন</button>
        </form>
      </div>
    </div>

    <script>
        let selectedProduct = "";

        // Search Logic
        function searchFunction() {
            let input = document.getElementById('myInput').value.toUpperCase();
            let cards = document.getElementsByClassName('product-container');
            for (let i = 0; i < cards.length; i++) {
                let name = cards[i].getElementsByClassName('product-name')[0].innerText;
                if (name.toUpperCase().indexOf(input) > -1) {
                    cards[i].style.display = "";
                } else {
                    cards[i].style.display = "none";
                }
            }
        }

        // Form Logic
        function openForm(name) {
            selectedProduct = name;
            document.getElementById("displayPName").innerText = "পণ্য: " + name;
            document.getElementById("orderModal").style.display = "block";
        }

        function closeForm() {
            document.getElementById("orderModal").style.display = "none";
        }

        function sendToWhatsApp() {
            const name = document.getElementById("custName").value;
            const phone = document.getElementById("custPhone").value;
            const address = document.getElementById("custAddress").value;
            const myNumber = "8801700000000"; // REPLACE WITH YOUR NUMBER
            
            if(name && phone && address) {
                const message = `*AuraBazar Order*%0A*Product:* ${selectedProduct}%0A*Name:* ${name}%0A*Phone:* ${phone}%0A*Address:* ${address}`;
                window.open(`https://wa.me/${myNumber}?text=${message}`, '_blank');
            } else {
                alert("সব তথ্য পূরণ করুন!");
            }
        }
    </script>
</body>
</html>
