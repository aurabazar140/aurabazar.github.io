<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraBazar | Premium Football Shop</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --gold: #FFD700;
            --black: #1a1a1a;
            --white: #ffffff;
            --whatsapp: #25D366;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 0;
        }

        header {
            background: var(--black);
            color: var(--gold);
            text-align: center;
            padding: 40px 20px;
            border-bottom: 5px solid var(--gold);
        }

        header h1 { margin: 0; font-size: 2.5rem; text-transform: uppercase; letter-spacing: 2px; }
        header p { margin: 5px 0 0; opacity: 0.8; }

        .search-container {
            text-align: center;
            padding: 30px 20px;
        }

        #myInput {
            width: 90%;
            max-width: 500px;
            padding: 15px 25px;
            border-radius: 30px;
            border: 2px solid #ddd;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        #myInput:focus { border-color: var(--gold); box-shadow: 0 0 10px rgba(255, 215, 0, 0.2); }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .product-card {
            background: var(--white);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: 0.3s;
        }

        .product-card:hover { transform: translateY(-10px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }

        .product-card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .product-card h2 { font-size: 1.2rem; margin: 10px 0; color: var(--black); }
        .price { font-size: 1.4rem; color: #e67e22; font-weight: 700; margin-bottom: 15px; }

        .shop-btn {
            background: var(--black);
            color: var(--white);
            border: 2px solid var(--gold);
            padding: 12px;
            width: 100%;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .shop-btn:hover { background: var(--gold); color: var(--black); }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0; top: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: white;
            margin: 5% auto;
            padding: 30px;
            width: 90%;
            max-width: 450px;
            border-radius: 20px;
            position: relative;
        }

        .close { float: right; font-size: 28px; font-weight: bold; cursor: pointer; }

        form input, form textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-family: inherit;
        }

        .confirm-btn {
            background: var(--whatsapp);
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }

        .social-footer {
            text-align: center;
            padding: 50px 20px;
            background: #fff;
            margin-top: 50px;
        }

        .social-links a {
            font-size: 2rem;
            margin: 0 15px;
            transition: 0.3s;
        }
        .social-links a:hover { opacity: 0.6; }
    </style>
</head>
<body>

    <header>
        <h1>AuraBazar</h1>
        <p><i class="fas fa-shipping-fast"></i> সারা বাংলাদেশে ক্যাশ অন ডেলিভারি</p>
    </header>

    <div class="search-container">
        <input type="text" id="myInput" onkeyup="searchFunction()" placeholder="আপনার পছন্দের জার্সি খুঁজুন (যেমন: Neymar)...">
    </div>

    <div id="product-list" class="product-grid">
        </div>

    <footer class="social-footer">
        <h3>আমাদের সোশ্যাল মিডিয়া</h3>
        <div class="social-links">
            <a href="https://www.facebook.com/aurabazar69" style="color: #1877F2;"><i class="fab fa-facebook"></i></a>
            <a href="https://www.instagram.com/the_aura_bazar" style="color: #E4405F;"><i class="fab fa-instagram"></i></a>
            <a href="https://www.tiktok.com/@aura_bazar0" style="color: #000;"><i class="fab fa-tiktok"></i></a>
        </div>
        <p style="margin-top: 20px;">© 2026 AuraBazar - All Rights Reserved</p>
    </footer>

    <div id="orderModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeForm()">&times;</span>
            <h2 style="text-align: center; margin-bottom: 5px;">অর্ডার ফর্ম</h2>
            <p id="pNameDisplay" style="text-align: center; color: #007bff; font-weight: 600; margin-bottom: 20px;"></p>
            
            <form id="orderForm">
                <input type="text" id="name" placeholder="আপনার পুরো নাম" required>
                <input type="tel" id="phone" placeholder="সচল মোবাইল নম্বর" required>
                <textarea id="address" placeholder="পুরো ঠিকানা (বাসা নং, রাস্তা, এলাকা, জেলা)" required></textarea>
                <button type="button" class="confirm-btn" onclick="submitToWhatsApp()">
                    <i class="fab fa-whatsapp"></i> অর্ডার সম্পন্ন করুন
                </button>
            </form>
        </div>
    </div>

    <script>
        // REPLACE with your real WhatsApp number
        const MY_WHATSAPP = "8801909475216";

        // Your Product Data
        const products = [
            { name: "Neymar Jr. Brazil Jersey", price: "1200 BDT", image: "neymar.jpg.jpeg" },
            { name: "Neymar Jr. Al-Hilal Kit", price: "1350 BDT", image: "neymar.jpg (2).jpeg" }
        ];

        const container = document.getElementById('product-list');
        let activeProduct = "";

        function displayProducts(data) {
            container.innerHTML = "";
            data.forEach(p => {
                container.innerHTML += `
                    <div class="product-card">
                        <img src="${p.image}" alt="${p.name}">
                        <h2>${p.name}</h2>
                        <p class="price">${p.price}</p>
                        <button class="shop-btn" onclick="openForm('${p.name}')">SHOP NOW</button>
                    </div>
                `;
            });
        }

        function searchFunction() {
            let term = document.getElementById('myInput').value.toUpperCase();
            let filtered = products.filter(p => p.name.toUpperCase().includes(term));
            displayProducts(filtered);
        }

        function openForm(name) {
            activeProduct = name;
            document.getElementById('pNameDisplay').innerText = "পণ্য: " + name;
            document.getElementById('orderModal').style.display = "block";
        }

        function closeForm() {
            document.getElementById('orderModal').style.display = "none";
        }

        function submitToWhatsApp() {
            const userName = document.getElementById('name').value;
            const userPhone = document.getElementById('phone').value;
            const userAddress = document.getElementById('address').value;

            if(!userName || !userPhone || !userAddress) {
                alert("সবগুলো ঘর পূরণ করুন!");
                return;
            }

            const text = `*নতুন অর্ডার (AuraBazar)*%0A--------------------------%0A*পণ্য:* ${activeProduct}%0A*নাম:* ${userName}%0A*ফোন:* ${userPhone}%0A*ঠিকানা:* ${userAddress}%0A--------------------------%0Aধন্যবাদ!`;
            window.open(`https://wa.me/${MY_WHATSAPP}?text=${text}`, '_blank');
        }

        // Initial Load
        displayProducts(products);

        // Close modal when clicking outside
        window.onclick = function(event) {
            if (event.target == document.getElementById('orderModal')) closeForm();
        }
    </script>
</body>
</html>
